<!DOCTYPE html>
<html lang="it" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Carburante</title>
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <link rel="stylesheet" href="css/header.css" />
    <link rel="stylesheet" href="css/fab.css" />

    <!-- No-cache -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <script src="js/menu.js" defer></script>
    <script src="js/fab.js" defer></script>
    <script src="js/config.js"></script>

    <!-- Imposta il tema prima del paint (identico a Pellet) -->
    <script>
      (function () {
        try {
          const saved = localStorage.getItem('theme');
          const prefersDark =
            window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          const theme = saved || (prefersDark ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>

    <style>
      :root {
        --space: 14px;

        /* Tema chiaro (identico a Pellet) */
        --bg: #ffffff;
        --text: #111827;
        --muted: #666666;
        --surface: #ffffff;
        --border: #dddddd;
        --divider: #eeeeee;
        --shadow: 0 2px 10px rgba(0, 0, 0, 0.08);
        --btn-hover: #f7f7f7;
        --spinner-track: rgba(0, 0, 0, 0.2);
        --spinner-head: rgba(0, 0, 0, 0.7);
      }
      html[data-theme='dark'] {
        --bg: #0f1115;
        --text: #e5e7eb;
        --muted: #9aa0a6;
        --surface: #151922;
        --border: #2a2f3a;
        --divider: #222834;
        --shadow: 0 2px 16px rgba(0, 0, 0, 0.35);
        --btn-hover: #1b2130;
        --spinner-track: rgba(255, 255, 255, 0.2);
        --spinner-head: rgba(255, 255, 255, 0.8);
      }
      body {
        color-scheme: light dark;
      }

      /* === Reset + layout pagina (identico a Pellet) ======================= */
      * {
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        max-width: 100%;
        overflow-x: hidden;
        margin: 0;
      }
      body.app {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        padding: 0 var(--space) var(--space);
        padding-top: 5px;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      h2 {
        margin: 0 0 10px;
      }
      label {
        display: block;
        margin: 12px 0 6px;
        font-size: 14px;
      }

      /* Controlli come in Pellet: nessun raggio, bordo + ombra uguali */
      input,
      select,
      button {
        width: 100%;
        max-width: 100%;
        font-size: 16px;
        padding: 10px;
        color: var(--text);
        background: var(--surface);
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
        border-radius: 0; /* niente arrotondamenti */
        height: 44px; /* ✅ altezza uniforme come Pellet */
        line-height: 1.4;
      }
      input::placeholder {
        color: var(--muted);
      }

      /* iOS/Safari: normalizza i campi particolari */
      input[type='date'] {
        -webkit-appearance: none;
        appearance: none;
        min-width: 0;
      }

      /* Select allineato: niente stile nativo e colore placeholder finché vuoto */
      select {
        -webkit-appearance: none;
        appearance: none;
        padding-right: 34px; /* spazio freccia sistema */
      }
      /* colore “placeholder” quando value="" e required → invalid */
      select:required:invalid {
        color: var(--muted);
      }
      option[value=''] {
        color: var(--muted);
      } /* voce placeholder nel menu */
      option {
        color: var(--text);
      }

      button {
        margin-top: 16px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        cursor: pointer;
        background: var(--surface);
      }
      button:hover {
        background: var(--btn-hover);
      }

      .ok {
        color: #22c55e;
        margin-top: 8px;
      }
      .err {
        color: #ef4444;
        margin-top: 8px;
      }

      /* Footer versione: centrato in fondo (come Pellet) */
      .muted {
        color: var(--muted);
        font-size: 12px;
        text-align: center;
        margin-top: auto;
        width: 100%;
        padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
      }
      .badge {
        display: inline-block;
        font-size: 12px;
        padding: 2px 8px;
        border-radius: 999px;
        border: 1px solid var(--border);
        margin-left: 8px;
        font-variant-numeric: tabular-nums;
        background: var(--surface);
      }

      /* Loader overlay (come Pellet) */
      .loading-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.15);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        backdrop-filter: blur(2px);
      }
      .loading-overlay[aria-hidden='false'] {
        display: flex;
      }
      .spinner {
        width: 38px;
        height: 38px;
        border: 3px solid var(--spinner-track);
        border-top-color: var(--spinner-head);
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .btn-spinner {
        width: 16px;
        height: 16px;
        border: 2px solid var(--spinner-track);
        border-top-color: var(--spinner-head);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      button[disabled] {
        opacity: 0.7;
        cursor: not-allowed;
        box-shadow: none;
      }

      /* Backdrop */
      #backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.15);
        display: none;
        z-index: 9997;
      }

      body.drawer-open .fab-menu,
      body.frame-open .fab-menu {
        opacity: 0;
        pointer-events: none;
        transform: translateY(8px);
      }

      /* Riga 50/50 per Importo + toggle "Scheda carburante" */
      .form-row-5050 {
        display: grid;
        grid-template-columns: 60% 40%;
        gap: var(--space);
        align-items: end; /* allinea il toggle al fondo */
      }

      /* Colonna destra: etichetta sopra e toggle sotto */
      .toggle-col {
        display: flex;
        flex-direction: column;
      }

      /* Toggle switch accessibile */
      .switch {
        position: relative;
        width: 52px;
        height: 30px;
        display: inline-block;
      }
      .switch input {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        opacity: 0; /* nascondo il checkbox, resta focusabile */
        cursor: pointer;
      }
      .switch .track {
        position: absolute;
        inset: 0;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--surface);
        box-shadow: var(--shadow);
        transition: background 0.15s ease, border-color 0.15s ease;
      }
      .switch .thumb {
        position: absolute;
        top: 2px;
        left: 2px;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: var(--text);
        transition: transform 0.18s ease;
      }

      /* Stato ON */
      .switch input:checked + .track {
        background: rgba(0, 160, 90, 0.15);
        border-color: #22c55e;
      }
      .switch input:checked + .track .thumb {
        transform: translateX(22px);
      }

      /* Focus visibile e accessibile */
      .switch input:focus-visible + .track {
        outline: 2px solid #2684ff;
        outline-offset: 2px;
      }

      /* Stato DISABILITATO */
      .switch input:disabled {
        cursor: not-allowed;
      }
      .switch input:disabled + .track {
        opacity: 0.4;
        box-shadow: none;
      }
      .switch input:disabled + .track .thumb {
        background: var(--muted);
      }
    </style>
  </head>

  <body class="app" data-no-fab-menu="1">
    <!-- Topbar identica -->
    <header class="topbar">
      <button id="menuBtn" class="menu-btn" aria-label="Apri menu">☰</button>
      <h2 class="title">💶 Costo di gestione</h2>
      <span class="right-slot" aria-hidden="true"></span>
    </header>

    <!-- Drawer identico a Pellet -->
    <div id="backdrop"></div>

    <!-- Form (campi a tutta larghezza come Pellet) -->
    <label>Data</label>
    <input id="data" type="date" required />

    <label for="auto">Auto</label>
    <select id="auto" required>
      <option value="">Seleziona auto</option>
    </select>

    <label for="categoria">Categoria</label>
    <select id="categoria" required>
      <option value="">Seleziona categoria</option>
    </select>

    <label for="sottocategoria">Sottocategoria</label>
    <select id="sottocategoria" required disabled>
      <option value="">Seleziona sottocategoria</option>
    </select>

    <label for="importo">Importo (€)</label>
    <input id="importo" type="text" inputmode="numeric" placeholder="es. 120,00" required />
    <button id="saveBtn"><span class="btn-text">Salva</span></button>
    <div id="msg" role="status" aria-live="polite"></div>

    <!-- Versione centrata in fondo
    <div class="muted">Versione: <span id="appVersion" class="badge"></span></div> -->

    <!-- Overlay globale -->
    <div
      id="loaderOverlay"
      class="loading-overlay"
      aria-hidden="true"
      aria-live="polite"
      aria-busy="false"
    >
      <div class="spinner" role="progressbar" aria-label="Salvataggio in corso"></div>
    </div>

    <!-- Overlay pagina secondaria -->
    <iframe
      id="pageFrame"
      style="
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        border: 0;
        display: none;
        background: var(--bg);
        z-index: 9999;
      "
    ></iframe>

    <script>
      const { ENDPOINT, SECRET } = window.APP_CONFIG;
      fetch(`${ENDPOINT}?secret=${SECRET}`);

      /* ===== Versione (identico a Pellet) ===== */
      function pad(n) {
        return String(n).padStart(2, '0');
      }
      function formatVersionFromDate(d) {
        return `${d.getFullYear()}.${pad(d.getMonth() + 1)}.${pad(d.getDate())}-${pad(
          d.getHours()
        )}:${pad(d.getMinutes())}`;
      }
      function computeAppVersion() {
        const qs = new URLSearchParams(location.search);
        const v = qs.get('v');
        if (v) return v;
        const d = new Date(document.lastModified);
        return isNaN(d) ? 'dev' : formatVersionFromDate(d);
      }
      function showAppVersion() {
        const el = document.getElementById('appVersion');
        if (el) el.textContent = computeAppVersion();
      }

      /* ===== Drawer + Theme toggle (copiato 1:1 da Pellet) ===== */
      (function () {
        const btn = document.getElementById('menuBtn');
        const drawer = document.getElementById('drawer');
        const backdrop = document.getElementById('backdrop');

        function updateThemeToggleLabel() {
          const el = document.getElementById('themeToggle');
          if (!el) return;
          const t = document.documentElement.getAttribute('data-theme') || 'light';
          el.textContent = t === 'dark' ? '☀️ Tema chiaro' : '🌙 Tema scuro';
        }
        function setTheme(t) {
          document.documentElement.setAttribute('data-theme', t);
          try {
            localStorage.setItem('theme', t);
          } catch (e) {}
          updateThemeToggleLabel();
          try {
            document.getElementById('pageFrame').contentWindow?.postMessage(`theme:${t}`, '*');
          } catch {}
        }
        updateThemeToggleLabel();

        const open = () => {
          drawer.style.transform = 'translateX(0)';
          backdrop.style.display = 'block';
          document.body.classList.add('drawer-open');
        };
        const close = () => {
          drawer.style.transform = 'translateX(-105%)';
          backdrop.style.display = 'none';
          document.body.classList.remove('drawer-open');
        };

        if (btn) btn.addEventListener('click', open);
        backdrop.addEventListener('click', close);
        const drawerClose = document.getElementById('drawerClose');
        if (drawerClose) drawerClose.addEventListener('click', close);

        const themeToggle = document.getElementById('themeToggle');
        if (themeToggle) {
          themeToggle.addEventListener('click', () => {
            const curr = document.documentElement.getAttribute('data-theme') || 'light';
            setTheme(curr === 'dark' ? 'light' : 'dark');
          });
        }

        try {
          const mql = window.matchMedia('(prefers-color-scheme: dark)');
          mql.addEventListener?.('change', e => {
            const saved = localStorage.getItem('theme');
            if (!saved) setTheme(e.matches ? 'dark' : 'light');
          });
        } catch (e) {}
      })();

      /* ===== Nav lista.html full-screen (identico a Pellet) ===== */
      document.addEventListener('DOMContentLoaded', () => {
        const pad2 = n => String(n).padStart(2, '0');
        const d = new Date(document.lastModified);
        const vIndex = isNaN(d)
          ? 'dev'
          : `${d.getFullYear()}.${pad2(d.getMonth() + 1)}.${pad2(d.getDate())}-${pad2(
              d.getHours()
            )}:${pad2(d.getMinutes())}`;

        const urlLista = `lista.html?v=${encodeURIComponent(vIndex)}`;
        const urlScheda = `scheda_carburante.html?v=${encodeURIComponent(vIndex)}`;
        const urlForecast = `forecast_km.html?v=${encodeURIComponent(vIndex)}`;
        const urlImpianti = `impianti_vicini.html?v=${encodeURIComponent(vIndex)}`;
        const urlImpiantiPreferiti = `impianti_preferiti.html?v=${encodeURIComponent(vIndex)}`;

        const linkLista = document.getElementById('goLista');
        const linkScheda = document.getElementById('goScheda');
        const linkForecast = document.getElementById('goForecast');
        const linkImpianti = document.getElementById('goImpianti');
        const linkImpiantiPreferiti = document.getElementById('goImpiantiPreferiti');
        const frame = document.getElementById('pageFrame');
        const drawer = document.getElementById('drawer');
        const backdrop = document.getElementById('backdrop');

        function openFrame(url) {
          if (drawer) drawer.style.transform = 'translateX(-105%)';
          if (backdrop) backdrop.style.display = 'none';
          document.body.classList.remove('drawer-open');

          frame.src = url;
          frame.style.display = 'block';
          document.body.classList.add('frame-open');

          history.pushState({ page: 'lista' }, '', '#lista');
        }
        function closeFrame() {
          frame.style.display = 'none';
          frame.src = 'about:blank';
          document.body.classList.remove('frame-open');
          if (location.hash === '#lista' || location.hash === '#scheda') {
            history.back();
          }
        }

        if (linkLista) {
          linkLista.href = urlLista;
          linkLista.setAttribute('target', '_self');
          linkLista.addEventListener('click', e => {
            e.preventDefault();
            openFrame(urlLista);
          });
        }
        if (linkScheda) {
          linkScheda.href = urlScheda;
          linkScheda.setAttribute('target', '_self');
          linkScheda.addEventListener('click', e => {
            e.preventDefault();
            openFrame(urlScheda, 'scheda');
          });
        }
        if (linkForecast) {
          linkForecast.href = urlForecast;
          linkForecast.setAttribute('target', '_self');
          linkForecast.addEventListener('click', e => {
            e.preventDefault();
            openFrame(urlForecast, 'forecast');
          });
        }
        if (linkImpianti) {
          linkImpianti.href = urlImpianti;
          linkImpianti.setAttribute('target', '_self');
          linkImpianti.addEventListener('click', e => {
            e.preventDefault();
            openFrame(urlImpianti, 'impianti');
          });
        }
        if (linkImpiantiPreferiti) {
          linkImpiantiPreferiti.href = urlImpiantiPreferiti;
          linkImpiantiPreferiti.setAttribute('target', '_self');
          linkImpiantiPreferiti.addEventListener('click', e => {
            e.preventDefault();
            openFrame(urlImpiantiPreferiti, 'impianti');
          });
        }

        document.querySelectorAll('select[required]').forEach(sel => {
          const syncColor = () => {
            sel.style.color = sel.value ? 'var(--text)' : 'var(--muted)';
          };
          syncColor();
          sel.addEventListener('change', syncColor);
        });

        window.addEventListener('popstate', () => {
          if (frame.style.display === 'block') {
            frame.style.display = 'none';
            frame.src = 'about:blank';
            document.body.classList.remove('frame-open');
          }
        });

        window.addEventListener('message', ev => {
          if (ev && ev.data === 'close-lista') closeFrame();
        });
      });

      /* ===== POS helpers (importo 2 dec) ===== */
      function formatPosFromDigits(digits, decimals) {
        if (!digits) return '';
        digits = digits.replace(/^0+/, '') || '0';
        if (decimals === 0) return digits;
        if (digits.length <= decimals) return `0,${digits.padStart(decimals, '0')}`;
        const intPart = digits.slice(0, -decimals);
        const decPart = digits.slice(-decimals);
        return `${intPart},${decPart}`;
      }
      function normalizedFromDigits(digits, decimals) {
        if (!/^\d+$/.test(digits)) return null;
        const n = Number(digits) / Math.pow(10, decimals);
        return n.toFixed(decimals);
      }
      function parseMoneySmart(value, maxDec) {
        const raw = String(value || '').trim();
        if (raw === '') return null;
        if (/^\d+$/.test(raw)) return normalizedFromDigits(raw, maxDec);
        const s = raw.replace(',', '.');
        if (!new RegExp(`^\\d+(\\.\\d{1,${maxDec}})?$`).test(s)) return null;
        return Number(s).toFixed(maxDec);
      }
      function attachPosMoney(el, decimals) {
        el.addEventListener('input', () => {
          const digits = (el.value || '').replace(/\D/g, '');
          const display = formatPosFromDigits(digits, decimals);
          const active = document.activeElement === el;
          el.value = display;
          if (active) {
            try {
              el.setSelectionRange(el.value.length, el.value.length);
            } catch {}
          }
        });
      }

      /* ===== Data default ===== */
      function initDate() {
        const d = new Date();
        const p = n => String(n).padStart(2, '0');
        document.getElementById('data').value = `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(
          d.getDate()
        )}`;
      }

      /* ===== Auto (dinamiche) ===== */
      async function initAutos() {
        const sel = document.getElementById('auto');
        if (!sel) return;

        sel.length = 1; // placeholder

        try {
          const res = await fetch(`${ENDPOINT}?action=autos&secret=${encodeURIComponent(SECRET)}`);
          const data = await res.json();

          if (data && data.ok && Array.isArray(data.autos)) {
            data.autos.forEach(a => {
              const id = String(a.id || '').trim();
              const marca = String(a.marca || '').trim();
              const modello = String(a.modello || '').trim();
              if (!id || !marca || !modello) return;

              const opt = document.createElement('option');
              opt.value = id;
              opt.textContent = `${marca} - ${modello}`;
              sel.appendChild(opt);
            });

            const qs = new URLSearchParams(location.search);
            const pre =
              qs.get('id_auto') ||
              qs.get('idAuto') ||
              (() => {
                try {
                  return localStorage.getItem('selectedAutoId');
                } catch {
                  return '';
                }
              })();

            if (pre) sel.value = pre;

            sel.addEventListener('change', () => {
              try {
                localStorage.setItem('selectedAutoId', sel.value || '');
              } catch {}
            });
          }
        } catch (e) {}
      }

      /* ===== Categorie/Sottocategorie (Categorie_Costi) ===== */
      let CATS = [];

      async function initCategorieCosti() {
        const catSel = document.getElementById('categoria');
        const subSel = document.getElementById('sottocategoria');

        catSel.length = 1;
        subSel.length = 1;
        subSel.disabled = true;

        try {
          const res = await fetch(
            `${ENDPOINT}?action=categories_costi&secret=${encodeURIComponent(SECRET)}`
          );
          const data = await res.json();

          if (data && data.ok && Array.isArray(data.categories)) {
            CATS = data.categories;
            CATS.forEach(c => {
              const opt = document.createElement('option');
              opt.value = c.id; // ID_CATEGORIA
              opt.textContent = c.label;
              catSel.appendChild(opt);
            });
          } else {
            CATS = [];
          }
        } catch (e) {
          CATS = [];
        }
      }

      function syncSottocategorie() {
        const catSel = document.getElementById('categoria');
        const subSel = document.getElementById('sottocategoria');

        const idCat = catSel.value;

        subSel.length = 1;
        subSel.value = '';
        subSel.disabled = true;

        if (!idCat) return;

        const cat = CATS.find(c => c.id === idCat);
        if (!cat || !Array.isArray(cat.items) || cat.items.length === 0) return;

        cat.items.forEach(s => {
          const opt = document.createElement('option');
          opt.value = s.id; // ID_SOTTOCATEGORIA
          opt.textContent = s.label;
          subSel.appendChild(opt);
        });

        subSel.disabled = false;
      }

      /* ===== Loader ===== */
      const saveBtn = document.getElementById('saveBtn');
      const btnText = saveBtn.querySelector('.btn-text');
      const loaderOverlay = document.getElementById('loaderOverlay');
      function setLoading(isLoading) {
        loaderOverlay.setAttribute('aria-hidden', String(!isLoading));
        loaderOverlay.setAttribute('aria-busy', String(isLoading));
        saveBtn.disabled = isLoading;
        saveBtn.setAttribute('aria-busy', String(isLoading));
        if (isLoading) {
          if (!saveBtn.querySelector('.btn-spinner')) {
            const s = document.createElement('span');
            s.className = 'btn-spinner';
            s.setAttribute('aria-hidden', 'true');
            saveBtn.prepend(s);
          }
          btnText.textContent = 'Salvo…';
        } else {
          const s = saveBtn.querySelector('.btn-spinner');
          if (s) s.remove();
          btnText.textContent = 'Salva';
        }
        document.querySelectorAll('input, select, button').forEach(el => {
          if (el !== saveBtn) el.disabled = isLoading;
        });
      }

      /* ===== Invio form ===== */
      async function sendForm(data) {
        const params = new URLSearchParams(data);
        const res = await fetch(ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8' },
          body: params.toString(),
        });
        return res.json();
      }

      async function onSaveClick() {
        const msg = document.getElementById('msg');
        msg.textContent = '';
        msg.className = '';

        const data = document.getElementById('data').value;
        const idAuto = document.getElementById('auto').value;
        const idCategoria = document.getElementById('categoria').value;
        const idSottocategoria = document.getElementById('sottocategoria').value;
        const importoNorm = parseMoneySmart(document.getElementById('importo').value, 2);

        if (!data) return (msg.textContent = 'Inserisci la data.'), (msg.className = 'err');
        if (!idAuto) return (msg.textContent = "Seleziona un'auto."), (msg.className = 'err');
        if (!idCategoria)
          return (msg.textContent = 'Seleziona una categoria.'), (msg.className = 'err');
        if (!idSottocategoria)
          return (msg.textContent = 'Seleziona una sottocategoria.'), (msg.className = 'err');
        if (importoNorm === null || Number(importoNorm) <= 0)
          return (msg.textContent = 'Importo non valido.'), (msg.className = 'err');

        const payload = {
          secret: SECRET,
          action: 'save_costo_gestione',
          data,
          idCategoria,
          idSottocategoria,
          importo: String(importoNorm).replace('.', ','),
          idAuto,
        };

        try {
          setLoading(true);
          const out = await sendForm(payload);
          if (out && out.ok) {
            msg.textContent = 'Salvato ✅';
            msg.className = 'ok';
            document.getElementById('importo').value = '';
            document.getElementById('categoria').selectedIndex = 0;
            document.getElementById('sottocategoria').selectedIndex = 0;
            document.getElementById('sottocategoria').disabled = true;
          } else {
            msg.textContent = out && out.error ? out.error : 'Errore di rete o autorizzazione.';
            msg.className = 'err';
          }
        } catch {
          msg.textContent = 'Sei offline. Dato non inviato.';
          msg.className = 'err';
        } finally {
          setLoading(false);
        }
      }

      /* ===== Boot ===== */
      document.addEventListener('DOMContentLoaded', () => {
        showAppVersion();
        initDate();

        attachPosMoney(document.getElementById('importo'), 2);

        initCategorieCosti();
        document.getElementById('categoria').addEventListener('change', syncSottocategorie);

        document.getElementById('saveBtn').addEventListener('click', onSaveClick);

        initAutos();
      });

      /* Ricarica se riaperta da bfcache (come Pellet) */
      addEventListener('pageshow', e => e.persisted && location.reload());
    </script>
  </body>
</html>
